<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1209">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="קליסטניקס">
  <title>קליסטניקס</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-icon">⚔</span>
          <span class="brand-name">קליסטניקס</span>
        </div>
        <div class="header-date" id="header-date"></div>
        <button class="header-pdf-btn" onclick="showLevelSelect()" title="שנה רמה">⚙</button>
      </div>
    </header>

    <main id="main-content"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">בית</span>
      </button>
      <button class="nav-btn" data-tab="workout">
        <span class="nav-icon">◈</span>
        <span class="nav-label">אימון</span>
      </button>
      <button class="nav-btn" data-tab="measurements">
        <span class="nav-icon">◉</span>
        <span class="nav-label">מדידות</span>
      </button>
      <button class="nav-btn" data-tab="history">
        <span class="nav-icon">◷</span>
        <span class="nav-label">היסטוריה</span>
      </button>
      <button class="nav-btn" data-tab="nutrition">
        <span class="nav-icon">⊛</span>
        <span class="nav-label">תזונה</span>
      </button>
    </nav>
  </div>

  <script src="pdf-parser.js"></script>
  <script src="app.js"></script>
</body>
</html>
